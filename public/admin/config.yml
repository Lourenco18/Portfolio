backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "projects"
    label: "Projetos"
    folder: "public/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - label: "Tecnologias"
        name: "tags"
        widget: "select"
        multiple: true
        options: ["HTML", "CSS", "JavaScript", "React", "NodeJS", "C", "Python", "Supabase", "Clerk"]
      - { label: "Descrição curta", name: "description", widget: "text" }
      - { label: "Descrição completa", name: "longDescription", widget: "markdown", required: false }
      - { label: "Imagem de capa", name: "image", widget: "image", required: false }
      - { label: "URL do site", name: "liveUrl", widget: "string", required: false, hint: "Link para o site ao vivo (opcional)" }
      - { label: "URL do GitHub", name: "githubUrl", widget: "string", required: false }
      - { label: "Documento (PDF)", name: "document", widget: "file", required: false }
      - { label: "Em destaque", name: "featured", widget: "boolean", default: false }
      - { label: "Ano", name: "year", widget: "string" }
      - label: "Estado"
        name: "status"
        widget: "select"
        options: ["Ativo", "Em desenvolvimento", "Arquivado"]
        default: "Ativo"
      - { label: "Ordem", name: "order", widget: "number", default: 0 }

  - name: "settings"
    label: "Definições do site"
    files:
      - label: "Sobre mim"
        name: "about"
        file: "public/content/about.json"
        fields:
          - { label: "Nome", name: "name", widget: "string" }
          - { label: "Função / Título", name: "role", widget: "string" }
          - { label: "Bio", name: "bio", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "GitHub", name: "github", widget: "string", required: false }
          - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
          - { label: "Foto", name: "avatar", widget: "image", required: false }

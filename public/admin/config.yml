backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "projects"
    label: "Projects"
    folder: "public/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Technologies"
        name: "tags"
        widget: "select"
        multiple: true
        options: ["HTML", "CSS", "JavaScript", "React", "NodeJS", "C", "Python", "Supabase", "Clerk"]
      - { label: "Short description", name: "description", widget: "text" }
      - { label: "Full description", name: "longDescription", widget: "markdown", required: false }
      - { label: "Cover image", name: "image", widget: "image", required: false }
      - { label: "Live URL", name: "liveUrl", widget: "string", required: false }
      - { label: "GitHub URL", name: "githubUrl", widget: "string", required: false }
      - { label: "Document (PDF)", name: "document", widget: "file", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Year", name: "year", widget: "string" }
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["Ativo", "Em desenvolvimento", "Arquivado"]
        default: "Ativo"
      - { label: "Order", name: "order", widget: "number", default: 0 }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "About"
        name: "about"
        file: "public/content/about.json"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Role / Title", name: "role", widget: "string" }
          - { label: "Bio", name: "bio", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "GitHub", name: "github", widget: "string", required: false }
          - { label: "LinkedIn", name: "linkedin", widget: "string", required: false }
          - { label: "Photo", name: "avatar", widget: "image", required: false }
          - { label: "CV / Resume (PDF)", name: "cv", widget: "file", required: false, hint: "Upload your CV as a PDF" }
